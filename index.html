<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dariku Untukmu</title>

<link href="https://fonts.googleapis.com/css2?family=Beau+Rivage&family=Montserrat:wght@400&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  color: white;
  font-family: 'Montserrat', sans-serif;
}

  
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}


#container {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 90%;
  max-width: 600px;
  text-align: center;
  opacity: 0;
  transition: opacity 1s;
}

.show {
  opacity: 1;
}


.title {
  font-family: 'Beau Rivage', cursive;
  color: #FFD700;
  margin-bottom: 25px;
}

.big { font-size: 10vw; }
.medium { font-size: 6vw; color: #FFF44F; }

.quote {
  font-size: 4.5vw;
  text-align: left;
  line-height: 1.8;
}

.poem {
  font-family: 'Beau Rivage';
  font-size: 5.5vw;
  line-height: 1.6;
  text-align: center;
}


button {
  position: fixed;
  bottom: 25px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 4vw;
  padding: 10px 25px;
  background: rgba(255,255,255,0.1);
  border: 1px solid white;
  color: white;
  border-radius: 10px;
}


.footer {
  position: fixed;
  bottom: 70px;
  width: 100%;
  text-align: center;
  font-size: 3.5vw;
}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<div id="container"></div>
<button onclick="next()">Next</button>

<script>

const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];

for (let i = 0; i < 120; i++) {
  stars.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    size: Math.random() * 2,
    speed: Math.random() * 0.5
  });
}

function drawStars() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = "white";

  stars.forEach(s => {
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
    ctx.fill();

    s.y += s.speed;
    if (s.y > canvas.height) {
      s.y = 0;
      s.x = Math.random() * canvas.width;
    }
  });

  requestAnimationFrame(drawStars);
}
drawStars();


let step = -1;

function show(content) {
  const c = document.getElementById("container");
  c.classList.remove("show");
  setTimeout(() => {
    c.innerHTML = content;
    c.classList.add("show");
  }, 300);
}

function next() {
  step++;

  if (step === 0) {
    show(`<div class="title big">Dariku Untukmu</div>`);
  }

  else if (step === 1) {
    show(`
      <div class="title medium">Bintang Biduku</div>
      <div class="quote">
      Saat samudera kehidupan bergejolak tanpa suara,<br>
      kau muncul sebagai titik utara yang paling setia.<br>
      Menjadi kompas saat aku kehilangan arah,<br>
      menuntunku pulang saat langkah terasa lelah.
      </div>
    `);
  }

  else if (step === 2) {
    show(`
      <div class="title medium">Kau adalah Matahariku</div>
      <div class="quote">
      Yang menyeka embun dingin di setiap pagi,<br>
      menghangatkan jiwa dengan cahaya yang tak pernah rugi.<br>
      Kau adalah alasan hariku penuh dengan warna,<br>
      mengubah mendung menjadi pelangi yang mempesona.
      </div>
    `);
  }

  else if (step === 3) {
    show(`
      <div class="title medium">Kau adalah Rembulanku</div>
      <div class="quote">
      Saat dunia jatuh ke dalam pelukan malam yang pekat,<br>
      kaulah cahaya lembut yang hadir memberi berkat.<br>
      Menuntun jemariku melewati bayangan yang kelam,<br>
      menjadi satu-satunya terang di tengah sunyinya malam.
      </div>
    `);
  }

  else if (step === 4) {
    show(`
      <div class="poem">
      Ada miliaran bintang yang berserakan di tata surya,<br>
      namun setiap kali aku menengadah, mataku hanya mencari satu pijar—yaitu kamu,<br>
      yang selalu bersinar paling terang di konstelasi hidupku.
      </div>
    `);
  }

  else if (step === 5) {
    show(`
      <div class="poem">
      Kau bagaikan bulan yang menerangi lautan,<br>
      Bagai bintang yang menghiasi langit dengan menawan.<br>
      Namun ku hanyalah lautan yang memiliki pantulanmu,<br>
      Tanpa pernah memilikimu.<br>
      Mencintaimu adalah caraku merayakan sunyi yang paling abadi.
      </div>
      <div class="footer">- Cantikania Finata</div>
    `);
  }

  else {
    show(`<div class="title medium">END</div>`);
    document.querySelector("button").style.display = "none";
  }
}
</script>

</body>
</html>
